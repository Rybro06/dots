# Global options
add_newline = true
command_timeout = 500
scan_timeout = 50
palette = "term"

# Palette definition
[palettes.term]
# Only use builtin colors so it matches the terminal theme
# black, red, green, blue, yellow, purple, cyan, white (and bright-variants)
base_bg = "black"
base_fg = "bright-white"
alt_fg = "black"
error = "red"
char_fg = "bright-green"
root_fg = "purple"
login_accent = "bright-white"
clock_accent = "cyan"
git_accent = "bright-green"
duration_accent = "bright-yellow"


[character]
format="â•°â”€$symbol"
success_symbol = "[ïˆ­ ](bold fg:char_fg)"
error_symbol = ""

[cmd_duration]
min_time = 2_000
show_milliseconds = true
show_notifications = false
min_time_to_notify = 60_000
style = "bg:base_bg fg:base_fg"
format = "[î‚¶](fg:duration_accent)[ï‰’ ](bg:duration_accent fg:alt_fg)[î‚¼](fg:duration_accent bg:base_bg)[ $duration]($style)[î‚´ ](fg:base_bg)"

[directory]
